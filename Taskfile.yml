version: "3"

dotenv: ['~/.config/go-postgres.env', '.env']

tasks:
  fmt:
    desc: Format Go code
    cmds:
      - gofmt -w .

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...

  test:
    desc: Run all tests
    cmds:
      - go test -count=1 ./...

  test:wasm:
    desc: Run tests under wasip1/wasm via wazero
    cmds:
      - GOWASIRUNTIME=wazero GOOS=wasip1 GOARCH=wasm go test -exec "$(go env GOROOT)/lib/wasm/go_wasip1_wasm_exec" -count=1 ./...

  build:
    desc: Build all packages
    cmds:
      - go build ./...

  check:
    desc: Run fmt, vet, lint, and test
    cmds:
      - task: fmt
      - task: vet
      - task: lint
      - task: test

  deps:tidy:
    desc: Tidy Go module dependencies
    cmds:
      - go mod tidy

  clean:
    desc: Clean build artifacts
    cmds:
      - go clean ./...
      - rm -rf docs/

  soak:local:
    desc: Run soak test locally (set SOAK_DURATION, e.g. task soak:local SOAK_DURATION=5m)
    cmds:
      - SOAK_DURATION={{.SOAK_DURATION | default "1m"}} SOAK_WORKERS={{.SOAK_WORKERS | default "4"}} SOAK_OUTPUT={{.SOAK_OUTPUT | default ""}} go test -run TestSoak -timeout 0 -count=1 -v

  soak:cloud:
    desc: Run soak test on Hetzner cloud VM
    cmds:
      - ./scripts/soak-cloud.sh

  docs:build:
    desc: Build documentation
    cmds:
      - task-plus md2html --file index.md --dst docs
