version: "3"

tasks:
  fmt:
    desc: Format Go code
    cmds:
      - gofmt -w .

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...

  test:
    desc: Run all tests
    cmds:
      - go test -count=1 ./...

  test:wasm:
    desc: Run tests under wasip1/wasm via wazero
    cmds:
      - GOWASIRUNTIME=wazero GOOS=wasip1 GOARCH=wasm go test -exec "$(go env GOROOT)/lib/wasm/go_wasip1_wasm_exec" -count=1 ./...

  build:
    desc: Build all packages
    cmds:
      - go build ./...

  check:
    desc: Run fmt, vet, lint, and test
    cmds:
      - task: fmt
      - task: vet
      - task: lint
      - task: test

  deps:tidy:
    desc: Tidy Go module dependencies
    cmds:
      - go mod tidy

  clean:
    desc: Clean build artifacts
    cmds:
      - go clean ./...
      - rm -rf docs/

  docs:build:
    desc: Build documentation
    cmds:
      - task-plus md2html --file index.md --dst docs
